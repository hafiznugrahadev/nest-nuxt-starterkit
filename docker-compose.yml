# ╭──────────────────────────────────────────────────────────────────────────╮
# │ DEV stack — full local environment with HOT RELOAD                          │
# │   infra:  postgres + redis                                                   │
# │   apps:   api (nest --watch) + web (nuxt HMR), source bind-mounted          │
# │                                                                            │
# │ One-time (network is shared with Dokploy):                                  │
# │   docker network create dokploy-network                                     │
# │ Run:  docker compose up            (full hot-reload stack)                   │
# │ Infra only:  docker compose up postgres redis                               │
# ╰──────────────────────────────────────────────────────────────────────────╯
name: starterkit-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: starterkit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-starterkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starterkit}
      POSTGRES_DB: ${POSTGRES_DB:-starterkit}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-starterkit}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [dokploy-network]

  redis:
    image: redis:7-alpine
    container_name: starterkit-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [dokploy-network]

  rustfs:
    image: rustfs/rustfs:latest
    container_name: starterkit-rustfs
    restart: unless-stopped
    user: '10001:10001'
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_ADDRESS: ':9000'
      RUSTFS_CONSOLE_ENABLE: 'true'
    ports:
      - '${RUSTFS_API_PORT:-9000}:9000'
      - '${RUSTFS_CONSOLE_PORT:-9001}:9001'
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9000/healthz/live > /dev/null 2>&1 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [dokploy-network]

  api:
    image: oven/bun:1.3.3
    container_name: starterkit-api-dev
    restart: unless-stopped
    working_dir: /app
    # Bootstrap via the dev entrypoint script (run with `sh` so the bind-mounted
    # file needs no exec bit). See docker/dev-api.sh.
    entrypoint: ['sh', '/app/docker/dev-api.sh']
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4400}
      API_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-starterkit}:${POSTGRES_PASSWORD:-starterkit}@postgres:5432/${POSTGRES_DB:-starterkit}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-min-16-chars}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 7
      # Base URL of the frontend — single source of truth (like Laravel APP_URL).
      # Set APP_URL in .env to override (e.g. https://web.starterkit-dev.orb.local).
      APP_URL: ${APP_URL:-http://localhost:${WEB_PORT:-4300}}
      # CORS_ORIGIN defaults to APP_URL in code; set only to explicitly override.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      LOG_LEVEL: debug
      # Dev/E2E: skip rate limiting so rapid test runs aren't throttled.
      THROTTLE_DISABLED: ${THROTTLE_DISABLED:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_USER: ${SWAGGER_USER:-admin}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-admin}
      # Dev email → Mailpit (catch-all SMTP; web UI at http://localhost:8025).
      MAIL_TRANSPORT: smtp
      MAIL_FROM: ${MAIL_FROM:-Starter Kit <no-reply@starterkit.test>}
      MAIL_SMTP_HOST: mailpit
      MAIL_SMTP_PORT: 1025
      MAIL_SMTP_SECURE: 'false'
      # Self-service registration (dev: on). Keep the API + web flags in sync.
      AUTH_REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      # File storage — defaults to local; set STORAGE_DRIVER=s3 in .env to use RustFS.
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
      S3_BUCKET: ${S3_BUCKET:-starterkit}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/starterkit}
    ports:
      - '${API_PORT:-4400}:${API_PORT:-4400}'
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules # keep container's linux deps + prisma engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
      rustfs:
        condition: service_started
    networks: [dokploy-network]

  web:
    image: oven/bun:1.3.3
    container_name: starterkit-web-dev
    restart: unless-stopped
    working_dir: /app
    # Bootstrap via the dev entrypoint script. See docker/dev-web.sh.
    entrypoint: ['sh', '/app/docker/dev-web.sh']
    environment:
      NODE_ENV: development
      PORT: ${WEB_PORT:-4300}
      HOST: 0.0.0.0
      # Public URL the browser uses. Drives the HMR WebSocket transport: behind the
      # OrbStack HTTPS proxy (https://web.…orb.local) Vite must point the client at
      # wss://<host>:443 or hot-reload can't connect. See nuxt.config.ts.
      APP_URL: ${APP_URL:-http://localhost:${WEB_PORT:-4300}}
      # Client-side calls hit the host-mapped API port.
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:${API_PORT:-4400}/api}
      NUXT_PUBLIC_REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      # Bind-mount file events don't cross into the container on macOS/Windows,
      # so Vite must poll for HMR to work. See nuxt.config.ts.
      NUXT_DEV_POLLING: 'true'
    ports:
      - '${WEB_PORT:-4300}:${WEB_PORT:-4300}'
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    networks: [dokploy-network]

  # One-off DB toolbox (bun + psql) for `db:restore`. Behind a profile, so
  # `docker compose up` never starts it. Run on demand — `run` (not `exec`) gives
  # it a TTY, which the interactive bucket browser needs:
  #   docker compose run --rm db-tools                      # browse and pick a dump
  #   docker compose run --rm db-tools --latest --yes       # newest dump, no prompt
  #   docker compose run --rm db-tools --path postgres/2026-07
  db-tools:
    build:
      context: .
      dockerfile: docker/db-tools.Dockerfile
    profiles: [tools]
    working_dir: /app
    entrypoint: ['sh', '/app/docker/db-tools.sh']
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # In-compose Postgres is `postgres:5432` — NOT the host-mapped port that
      # DATABASE_URL in .env points at. Set here so it wins over the .env value
      # (dotenv never overrides a real env var).
      DATABASE_URL: postgresql://${POSTGRES_USER:-starterkit}:${POSTGRES_PASSWORD:-starterkit}@postgres:5432/${POSTGRES_DB:-starterkit}?schema=public
      # Backup bucket — same vars as the host CLI. If BACKUP_S3_ENDPOINT points at
      # localhost, override it here with a host reachable from the container
      # (an external domain, or `host.docker.internal`).
      BACKUP_DRIVER: ${BACKUP_DRIVER:-s3}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_REGION: ${BACKUP_S3_REGION:-us-east-1}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
      BACKUP_S3_FORCE_PATH_STYLE: ${BACKUP_S3_FORCE_PATH_STYLE:-true}
      BACKUP_S3_PREFIX: ${BACKUP_S3_PREFIX:-}
      BACKUP_LOCAL_DIR: ${BACKUP_LOCAL_DIR:-./storage/backups}
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules # shared with the api container
    depends_on:
      postgres:
        condition: service_healthy
    networks: [dokploy-network]

  # Dev mail catcher — SMTP sink + web UI. The API (MAIL_TRANSPORT=smtp) sends here;
  # open the UI to read password-reset and other emails. Not for production.
  mailpit:
    image: axllent/mailpit:latest
    container_name: starterkit-mailpit
    restart: unless-stopped
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025' # SMTP endpoint (API → mailpit:1025)
      - '${MAILPIT_UI_PORT:-8025}:8025' # Web UI → http://localhost:8025
    networks: [dokploy-network]

# Shared with Dokploy/Traefik. Create once: `docker network create dokploy-network`.
networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  api_node_modules:
  web_node_modules:
