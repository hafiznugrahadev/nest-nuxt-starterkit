# ╭──────────────────────────────────────────────────────────────────────────╮
# │ DEV stack — full local environment with HOT RELOAD                          │
# │   infra:  postgres + redis + rustfs                                         │
# │   apps:   api (nest --watch) + web (nuxt HMR), source bind-mounted          │
# │                                                                            │
# │ One-time (network is shared with Dokploy):                                  │
# │   docker network create dokploy-network                                     │
# │ Run:  docker compose up            (full hot-reload stack)                   │
# │ Infra only:  docker compose up postgres redis rustfs                        │
# ╰──────────────────────────────────────────────────────────────────────────╯
name: minisoccer-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: minisoccer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minisoccer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minisoccer}
      POSTGRES_DB: ${POSTGRES_DB:-minisoccer}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-minisoccer}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [dokploy-network]

  redis:
    image: redis:7-alpine
    container_name: minisoccer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [dokploy-network]

  rustfs:
    image: rustfs/rustfs:latest
    container_name: minisoccer-rustfs
    restart: unless-stopped
    command: ['/data']
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: 'true'
    ports:
      - '${RUSTFS_PORT:-9000}:9000'
    volumes:
      - rustfs_data:/data
    networks: [dokploy-network]

  api:
    image: oven/bun:1.3.3
    container_name: minisoccer-api-dev
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "bun install --frozen-lockfile &&
             bun run --filter @minisoccer/shared-types build &&
             bun run --filter @minisoccer/api prisma:generate &&
             bun run --filter @minisoccer/api dev"
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4400}
      API_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-minisoccer}:${POSTGRES_PASSWORD:-minisoccer}@postgres:5432/${POSTGRES_DB:-minisoccer}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-min-16-chars}
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:${WEB_PORT:-4300}
      LOG_LEVEL: debug
    ports:
      - '${API_PORT:-4400}:${API_PORT:-4400}'
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules # keep container's linux deps + prisma engine
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [dokploy-network]

  web:
    image: oven/bun:1.3.3
    container_name: minisoccer-web-dev
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "bun install --frozen-lockfile &&
             bun run --filter @minisoccer/shared-types build &&
             bun run --filter @minisoccer/web dev"
    environment:
      NODE_ENV: development
      PORT: ${WEB_PORT:-4300}
      HOST: 0.0.0.0
      # Client-side calls hit the host-mapped API port.
      NUXT_PUBLIC_API_BASE: http://localhost:${API_PORT:-4400}/api
    ports:
      - '${WEB_PORT:-4300}:${WEB_PORT:-4300}'
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    networks: [dokploy-network]

# Shared with Dokploy/Traefik. Create once: `docker network create dokploy-network`.
networks:
  dokploy-network:
    external: true

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  api_node_modules:
  web_node_modules:
