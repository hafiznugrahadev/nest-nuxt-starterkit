name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel superseded runs on the same ref (e.g. rapid pushes / PR updates).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    # Placeholder URL: no CI step connects to a DB; it only satisfies Prisma's
    # config/generate. Real connection strings are injected at deploy time.
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Prereqs the gates depend on: Prisma client + the shared-types build.
      - name: Generate Prisma client
        run: bun run --filter @starterkit/api prisma:generate

      - name: Build shared-types
        run: bun run --filter @starterkit/shared-types build

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
