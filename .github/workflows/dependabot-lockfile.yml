name: Dependabot lockfile

# Dependabot has no Bun support: it edits package.json but leaves bun.lock
# untouched, so every npm PR it opens dies instantly on CI's
# `bun install --frozen-lockfile`. This job regenerates the lockfile on the PR
# branch and pushes it back, which keeps --frozen-lockfile meaningful for
# human PRs instead of weakening it for everyone.
on:
  pull_request:
    branches: [main, develop]

# Dependabot-triggered runs get a read-only GITHUB_TOKEN by default; this grants
# the write needed to push the lockfile commit back onto the PR branch.
permissions:
  contents: write

concurrency:
  group: dependabot-lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    name: Sync bun.lock
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      # `github.head_ref` is attacker-controllable in general (branch names are
      # user input), which is why it never reaches a `run:` script here. The
      # actor gate above also means only Dependabot's own branches get this far.
      # Actions are pinned to commit SHAs, not tags: this is the only workflow
      # in the repo holding `contents: write`, so a moved tag on a third-party
      # action would hand a token with push access to whoever moved it.
      # Dependabot's github-actions ecosystem keeps the SHAs fresh.
      - name: Checkout the PR branch
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.3

      # Deliberately NOT --frozen-lockfile: resolving the bumped package.json is
      # the whole point. --ignore-scripts mirrors docker/dev-api.sh — workspace
      # postinstalls (web's `nuxt prepare`) need shared-types built first.
      - name: Regenerate bun.lock
        run: bun install --ignore-scripts

      - name: Commit and push if it changed
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock already in sync — nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): sync bun.lock with the bumped package.json"
          git push
          echo "::notice::bun.lock synced. Pushes made with GITHUB_TOKEN do not \
          retrigger CI — re-run the failed CI job on this PR to verify it."
